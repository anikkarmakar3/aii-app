version: "3.9"

services:

  app:
    image: anik1999/aii-app:latest
    container_name: fastapi-app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

    ports:
      - "8000:8000"

    networks:
      - backend

  postgres:
    image: postgres:16

    container_name: postgres-db

    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - backend

  redis:
    image: redis:7

    container_name: redis-cache

    restart: unless-stopped

    volumes:
      - redis_data:/data

    networks:
      - backend

  nginx:
    image: nginx:latest

    container_name: nginx

    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

    networks:
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  backend: